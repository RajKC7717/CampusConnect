name: campusconnect
description: "CampusConnect — The exclusive all-in-one app for college students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Fonts — Sora (display) + DM Sans (body)
  google_fonts: ^6.1.0

  # Smooth page indicator for onboarding dots
  smooth_page_indicator: ^1.1.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Uncomment and add real assets when available:
  # assets:
  #   - assets/images/

  # Fonts are loaded via google_fonts package (no local font files needed)